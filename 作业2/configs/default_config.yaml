# 训练配置文件
# 用于控制训练过程中的各种参数

# 数据配置
data:
  data_root: "./mnist_images"  # 数据根目录
  train_dir: "train"          # 训练集目录
  test_dir: "test"            # 测试集目录
  batch_size: 64              # 批次大小
  num_workers: 2              # 数据加载进程数
  pin_memory: true            # 是否使用锁页内存
  image_size: 28              # 图像大小

# 数据预处理配置
transforms:
  # 训练数据增强
  train:
    - name: "Grayscale"
      params:
        num_output_channels: 1
    - name: "ToTensor"
      params: {}
    - name: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]
    - name: "RandomHorizontalFlip"
      params:
        p: 0.5
    - name: "RandomRotation"
      params:
        degrees: 10

  # 测试数据预处理
  test:
    - name: "Grayscale"
      params:
        num_output_channels: 1
    - name: "ToTensor"
      params: {}
    - name: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]

# 模型配置
model:
  name: "LNnet"  # 模型名称
  params:
    input_size: 784  # 输入大小 (28*28)
    hidden_size: 256  # 隐藏层大小
    num_classes: 10   # 类别数

# 训练配置
training:
  epochs: 10                 # 训练轮数
  learning_rate: 0.001       # 学习率
  weight_decay: 0.0001       # 权重衰减
  momentum: 0.9              # 动量
  optimizer: "Adam"          # 优化器名称: Adam, SGD, AdamW
  loss_function: "CrossEntropyLoss"  # 损失函数
  scheduler:                 # 学习率调度器
    name: "ReduceLROnPlateau"
    params:
      mode: "max"
      factor: 0.5
      patience: 2
      verbose: true
  gradient_clip: null        # 梯度裁剪阈值, null表示不裁剪
  early_stopping:            # 早停配置
    patience: 5              # 容忍次数
    min_delta: 0.001         # 最小改进量

# 验证配置
validation:
  interval: 1                 # 验证间隔(每N个epoch验证一次)
  save_best: true            # 是否保存最佳模型
  metric: "accuracy"         # 验证指标: accuracy, loss

# 输出配置
output:
  save_dir: "./outputs"       # 输出目录
  checkpoint_dir: "./outputs/checkpoints"  # 模型检查点目录
  log_dir: "./outputs/logs"   # 日志目录
  vis_dir: "./outputs/visualizations"  # 可视化目录
  save_interval: 1            # 保存检查点间隔
  save_optimizer: true        # 是否保存优化器状态
  tensorboard: false         # 是否使用TensorBoard

# 设备配置
device:
  device: "auto"             # 设备选择: auto, cuda, mps, cpu
  mixed_precision: false     # 是否使用混合精度训练
  num_gpus: 1                # 使用的GPU数量

# 日志配置
logging:
  level: "INFO"              # 日志级别: DEBUG, INFO, WARNING, ERROR
  save_to_file: true         # 是否保存到文件
  console_output: true       # 是否输出到控制台

# 随机种子配置
random_seed:
  seed: 42                   # 随机种子
  deterministic: true        # 是否使用确定性算法
  benchmark: false           # 是否启用cudnn benchmark

# 实验信息
experiment:
  name: "mnist_classification"  # 实验名称
  description: "MNIST手写数字分类实验"  # 实验描述
  tags: ["mnist", "classification"]  # 实验标签
